name: CI - Vérification Firmware ESP32

on:
  push:
    branches: [ "main", "master" ]
    # Le vigile : on déclenche uniquement si on touche aux ESP32 ou à ce workflow
    paths:
      - 'Firmware/ESP32_Slaves_Autoclaves/**'
      - '.github/workflows/build_esp32.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Récupération du code source
      uses: actions/checkout@v4

    - name: 🐍 Installation de Python (Requis pour PlatformIO)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: ⚙️ Installation de PlatformIO
      run: pip install -U platformio

    - name: 🚀 Compilation du Firmware (ESP32 Autoclaves)
      run: |
        cd Firmware/ESP32_Slaves_Autoclaves
        pio run